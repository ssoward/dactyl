services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dactyl
      POSTGRES_USER: dactyl
      POSTGRES_PASSWORD: dactyl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dactyl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://dactyl:dactyl@postgres:5432/dactyl
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:3000/v1
      RS256_PRIVATE_KEY: ${RS256_PRIVATE_KEY}
      RS256_PUBLIC_KEY: ${RS256_PUBLIC_KEY}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-devwebhooksecret00000000000000000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      CLAIM_TTL_SECONDS: 600
      PROGRESS_TTL_SECONDS: 3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "node dist/scripts/db-migrate.js && node dist/scripts/db-seed.js && node dist/index.js"

  worker:
    build: .
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dactyl:dactyl@postgres:5432/dactyl
      REDIS_URL: redis://redis:6379
      RS256_PRIVATE_KEY: ${RS256_PRIVATE_KEY}
      RS256_PUBLIC_KEY: ${RS256_PUBLIC_KEY}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-devwebhooksecret00000000000000000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: node dist/worker.js

volumes:
  pgdata:
